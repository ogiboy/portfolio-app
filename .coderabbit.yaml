# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
tone_instructions: "Be concise, direct, security-aware, and actionable. Prioritize correctness, testability, runtime safety, and clear evidence over style-only comments."
early_access: false
enable_free_tier: true
inheritance: true

reviews:
  profile: assertive
  request_changes_workflow: false

  high_level_summary: true
  high_level_summary_instructions: |
    Provide a concise high-level summary of the PR that captures the key changes, motivation, and potential impact. Focus on the most important aspects for reviewers to understand the purpose and scope of the PR without needing to read all details. Avoid restating the PR description or listing every change. Instead, synthesize the essence of the PR in a way that highlights what reviewers should pay attention to.
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false

  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: |
    Generate a concise and descriptive title for this PR based on the changes made. The title should follow Conventional Commit style, starting with a type (feat, fix, perf, docs, build, ci, chore, refactor, test, style), an optional scope in parentheses, and a brief imperative summary of the change. Avoid vague titles like 'Update code' or 'Fix bug' and instead capture the essence of the change in a way that is informative to reviewers and maintainers.

  review_status: true
  review_details: true
  commit_status: true
  fail_commit_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true

  suggested_labels: true
  labeling_instructions:
    - label: bug
      instructions: "Apply when the PR fixes broken behavior, runtime exceptions, failed checks, incorrect data, or UI/API malfunctions."
    - label: feature
      instructions: "Apply when the PR adds new capabilities, user-visible improvements, or non-breaking enhancements."
    - label: security
      instructions: "Apply when the PR addresses secrets, auth, supply chain, dependency vulnerabilities, sandboxing, broker execution, or external access risks."
    - label: tests
      instructions: "Apply when the PR primarily changes test code or test infrastructure without changing runtime behavior."
    - label: ci
      instructions: "Apply when the PR changes build config, release config, GitHub Actions workflows, CodeQL/security scans, or automation scripts."
    - label: docs
      instructions: "Apply when the PR changes documentation, prompts, runbooks, README, or operator guidance without changing runtime code."
    - label: refactor
      instructions: "Apply when the PR changes code structure, organization, or style without changing external behavior or adding features."
    - label: dependencies
      instructions: "Apply when the PR changes dependencies, dependency versions, lockfiles, or build metadata without changing runtime code."
    - label: webgui
      instructions: "Apply when the PR changes frontend code, dashboard code, UI components, routes, styling, or browser-facing behavior."
    - label: sidecar
      instructions: "Apply when the PR changes research sidecars, CrewAI-style orchestration, subprocess boundaries, or inter-runtime communication without changing core trading runtime code."
  auto_apply_labels: true

  suggested_reviewers: true
  auto_assign_reviewers: true
  suggested_reviewers_instructions:
    - reviewers:
        - handle: "ogiboy"
          type: user
      instructions: "Assign for all PRs."
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true

  path_filters:
    - "!**/.DS_Store"
    - "!**/.pytest_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/.mypy_cache/**"
    - "!**/.venv/**"
    - "!**/venv/**"
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/out/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!runtime/**"
    - "!**/gen/**"
    - "!**/_gen/**"
    - "!**/generated/**"
    - "!**/@generated/**"
    - "!**/vendor/**"
    - "!**/*.min.js"
    - "!**/*.min.js.map"
    - "!**/*.min.css"
    - "!**/*.map"
    - "!**/*.lock"
    - "!uv.lock"
    - "!poetry.lock"
    - "!package-lock.json"
    - "!pnpm-lock.yaml"
    - "!yarn.lock"
    - "!skills-lock.json"
    - "!**/*.pyc"
    - "!**/*.pyo"
    - "!**/*.pyd"
    - "!**/__pycache__/**"
    - "!**/*.so"
    - "!**/*.dylib"
    - "!**/*.dll"
    - "!**/*.exe"
    - "!**/*.bin"
    - "!**/*.db"
    - "!**/*.sqlite"
    - "!**/*.sqlite3"
    - "!**/*.csv"
    - "!**/*.tsv"
    - "!**/*.parquet"
    - "!**/*.pkl"
    - "!**/*.pickle"
    - "!**/*.gz"
    - "!**/*.xz"
    - "!**/*.bz2"
    - "!**/*.zip"
    - "!**/*.7z"
    - "!**/*.rar"
    - "!**/*.zst"
    - "!**/*.tar"
    - "!**/*.jar"
    - "!**/*.war"
    - "!**/*.pdf"
    - "!**/*.doc"
    - "!**/*.docx"
    - "!**/*.xls"
    - "!**/*.xlsx"
    - "!**/*.ppt"
    - "!**/*.pptx"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.bmp"
    - "!**/*.tiff"
    - "!**/*.ico"
    - "!**/*.svg"
    - "!**/*.webp"
    - "!**/*.mp3"
    - "!**/*.wav"
    - "!**/*.mp4"
    - "!**/*.mov"
    - "!**/*.avi"
    - "!**/*.mkv"
    - "!**/*.webm"
    - "!**/*.woff"
    - "!**/*.woff2"
    - "!**/*.ttf"
    - "!**/*.otf"
    - "!**/*.eot"
    - "!**/*.tfstate"
    - "!**/*.tfstate.backup"
    - "src/**"
    - "tests/**"
    - "scripts/**"
    - ".github/**"
    - ".ai/**"
    - ".coderabbit.yaml"
    - "sonar-project.properties"
    - "*.md"
    - "*.py"
    - "*.properties"
    - "*.toml"
    - "*.yaml"
    - "*.yml"
    - "*.json"

  path_instructions:
    - path: "src/**"
      instructions: "Check for correctness, testability, runtime safety, and clear evidence. Pay special attention to broker execution paths, provider interactions, safety gates, and any changes that could impact live trading behavior or operator visibility."
    - path: "src/app/**"
      instructions: "Check for correctness, testability, runtime safety, and clear evidence. Pay special attention to UI state handling, API contract changes, accessibility impacts, build safety, and whether dashboard data is clearly labeled."
    - path: "src/components/**"
      instructions: "Check for correctness, testability, runtime safety, and clear evidence. Pay special attention to UI state handling, API contract changes, accessibility impacts, build safety, and whether dashboard data is clearly labeled."
    - path: "tests/**"
      instructions: "Check for meaningful test coverage of new or changed functionality, edge cases, and regression scenarios. Ensure safety gates, provider behavior changes, and critical logic are well-tested. Avoid approving PRs that introduce significant untested changes in these areas."
    - path: "i18n/**"
      instructions: "Check for correctness, clarity, and cultural sensitivity in translations. Ensure that any changes to i18n files maintain the intended meaning and tone across supported languages. Pay special attention to any user-facing text that could impact operator understanding or behavior."
    - path: "content/**"
      instructions: "Check for correctness, clarity, and actionable guidance in documentation, prompts, runbooks, and README files. Ensure that any changes maintain clear operator guidance, especially around safety-critical scenarios, provider behavior, and troubleshooting steps."
    - path: "types/**"
      instructions: "Check for correctness and clarity in type definitions. Ensure that any changes maintain accurate type information that reflects the runtime behavior of the code, especially around broker interactions, provider data structures, and safety gate conditions."
    - path: ".github/workflows/**"
      instructions: "Check for CI/release config issues such as semantic-release compatibility, Conventional Commit title enforcement, least-privilege permissions, and secret exposure. Ensure that any changes to workflows maintain the integrity and security of the CI/CD pipeline."
    - path: ".ai/**"
      instructions: "Check for correctness, testability, runtime safety, and clear evidence in AI-related code, prompts, and configurations. Pay special attention to any changes that could impact model behavior, prompt effectiveness, or operator understanding of AI-driven features."

  abort_on_close: true
  disable_cache: false

  slop_detection:
    enabled: true
    label: slop

  auto_review:
    enabled: true
    description_keyword: ""
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 5
    ignore_title_keywords:
      - "wip"
      - "draft"
      - "do not review"
      - "skip review"
    labels: []
    drafts: false
    base_branches:
      - ".*"
    ignore_usernames: []

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false
    custom:
      - enabled: true
        name: "check trading safety gates"
        instructions: "Inspect the PR for accidental live-trading enablement, broker endpoint mistakes, missing paper-mode defaults, unsafe order execution paths, or missing operator approval gates. Propose minimal targeted fixes only."
      - enabled: true
        name: "check provider evidence"
        instructions: "Inspect changed provider, diagnostics, and review-evidence code for missing source attribution, hidden fallbacks, stale timestamps, incomplete context-pack fields, or evidence-bundle regressions. Propose minimal targeted fixes only."
      - enabled: true
        name: "check ci release guard"
        instructions: "Inspect changed CI/release files for semantic-release compatibility, Conventional Commit title enforcement, least-privilege permissions, and secret exposure. Propose minimal targeted fixes only."

  pre_merge_checks:
    override_requested_reviewers_only: false
    docstrings:
      mode: warning
      threshold: 70
    title:
      mode: error
      requirements: "The PR title must be a valid Conventional Commit subject: one of feat, fix, perf, docs, build, ci, chore, refactor, test, style; optional scope; imperative summary; no untyped titles."
    description:
      mode: warning
    issue_assessment:
      mode: warning
    custom_checks:
      - mode: error
        name: "No accidental live trading"
        instructions: "Fail if the PR enables live trading by default, bypasses explicit external paper enablement, weakens no-live-until-approved behavior, or hides broker endpoint selection."
      - mode: warning
        name: "Provider evidence visible"
        instructions: "Warn if provider fallback, selected provider, source attribution, data quality flags, timestamps, or review evidence artifacts become less visible to operators."
      - mode: warning
        name: "Tests cover safety changes"
        instructions: "Warn if trading safety gates, broker behavior, provider diagnostics, or context-pack/evidence changes are not covered by meaningful tests or documented manual validation."
      - mode: error
        name: "No secrets or tokens"
        instructions: "Fail if changed code, docs, workflows, fixtures, or logs include API keys, broker credentials, auth tokens, private keys, session cookies, or realistic secret-looking placeholders."

  tools:
    ast-grep:
      essential_rules: true
      packages: []
      rule_dirs: []
      util_dirs: []
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 180000
    languagetool:
      enabled: true
      level: default
      enabled_rules: []
      disabled_rules: []
      enabled_categories: []
      disabled_categories: []
      enabled_only: false
    biome:
      enabled: false
    hadolint:
      enabled: true
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true
    checkov:
      enabled: true
    eslint:
      enabled: true
    actionlint:
      enabled: true
    zizmor:
      enabled: true
    opengrep:
      enabled: true
    semgrep:
      enabled: true
    trivy:
      enabled: true
    pylint:
      enabled: true
    oxc:
      enabled: true
    dotenvLint:
      enabled: true
    htmlhint:
      enabled: true
    stylelint:
      enabled: true
    checkmake:
      enabled: true
    osvScanner:
      enabled: true

chat:
  art: false
  allow_non_org_members: false
  auto_reply: true
  integrations:
    jira:
      usage: auto
    linear:
      usage: auto

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
      - ".github/copilot-instructions.md"
      - ".github/instructions/*.instructions.md"
      - ".ai/**/*.md"
      - files: ".ai/prompts/**/*.prompt.md"
        applyTo: "**/*"
  learnings:
    scope: auto
    approval_delay: 0
  issues:
    scope: auto
  jira:
    usage: auto
    project_keys: []
  linear:
    usage: auto
    team_keys: []
  pull_requests:
    scope: auto
  mcp:
    usage: auto
    disabled_servers: []
  automatic_repository_linking: false
  linked_repositories: []

code_generation:
  docstrings:
    language: en-US
    path_instructions:
      - path: "src/**/*.ts||src/**/*.tsx"
        instructions: "Generate concise Google-style or project-consistent docstrings only for public functions/classes or non-obvious internal logic. Do not restate types already clear from annotations."
      - path: "tests/**/*.ts||tests/**/*.tsx"
        instructions: "Avoid verbose docstrings in tests unless they clarify safety-critical scenarios or regression intent."
  unit_tests:
    path_instructions:
      - path: "src/**/*.ts||src/**/*.tsx"
        instructions: "Generate unit tests that cover new or changed functionality, edge cases, and regression scenarios. Prioritize meaningful assertions over snapshot tests. Ensure safety gates and provider behavior changes are well-tested."
      - path: "tests/**/*.ts||tests/**/*.tsx"
        instructions: "Generate additional tests to cover untested code paths, safety gates, provider diagnostics, and regression cases. Avoid generating redundant tests that do not add coverage or value."

issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - feature
        - bug
        - security
        - refactor
        - dependencies
        - sidecar
        - webgui
  labeling:
    labeling_instructions:
      - label: bug
        instructions: "Broken behavior, runtime exception, regression, failed check, incorrect data, or UI/API malfunction."
      - label: feature
        instructions: "New capability or user-visible improvement."
      - label: security
        instructions: "Secrets, auth, supply chain, dependency vulnerability, sandboxing, broker execution, or external access risk."
      - label: tests
        instructions: "Test-only or test-infrastructure issue."
      - label: ci
        instructions: "Build, release, GitHub Actions, CodeQL, semantic-release, or automation issue."
      - label: docs
        instructions: "Documentation, prompt, runbook, README, or operator guidance issue."
      - label: dependencies
        instructions: "Dependency upgrade, vulnerability remediation, package manager, lockfile, or build metadata issue."
      - label: webgui
        instructions: "Frontend, dashboard, UI, route, styling, or browser-facing issue."
      - label: sidecar
        instructions: "Research sidecar, CrewAI-style orchestration, subprocess boundary, or inter-runtime communication issue."
    auto_apply_labels: true
